name: sprites

# Validate the sprite_studio tool whenever the bestiary or the tool changes.

on:
  push:
    branches: [master]
    paths:
      - "assets/bestiary.toml"
      - "tools/sprite_studio/**"
      - ".github/workflows/sprites.yml"
  pull_request:
    paths:
      - "assets/bestiary.toml"
      - "tools/sprite_studio/**"
      - ".github/workflows/sprites.yml"

concurrency:
  group: sprites-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build and test sprite_studio
        run: |
          cargo test -p sprite_studio --locked
          cargo build -p sprite_studio --locked
