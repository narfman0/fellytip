[package]
name    = "fellytip-client"
version = "0.1.0"
edition = "2021"

[features]
debug = []

[dependencies]
fellytip-shared    = { workspace = true }
bevy               = { workspace = true, default-features = true, features = ["bevy_remote", "keyboard"] }
lightyear          = { workspace = true, features = ["std", "server", "client", "netcode", "udp", "replication", "prediction", "interpolation", "input_native"] }
anyhow             = { workspace = true }
tracing            = { workspace = true }
tracing-subscriber = { workspace = true }
