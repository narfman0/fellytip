# ── Voiceover stingers ───────────────────────────────────────────────────────
[voice]
"level_up.ogg" = "Voiceover Pack/Audio (Male)/level_up.ogg"
"ready.ogg"    = "Voiceover Pack Fighter/Audio/ready.ogg"
