[music]
"overworld_01.ogg" = "Music Loops/Loops/Farm Frolics.ogg"
"overworld_02.ogg" = "Music Loops/Loops/Sad Town.ogg"
"overworld_03.ogg" = "Music Loops/Loops/Mishief Stroll.ogg"
