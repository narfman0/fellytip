# Synty Polygon Fantasy Kingdom — priority FBX → GLB conversion manifest.
# Only converts the ~65 assets needed by Fellytip's rendering pipeline.
# Run via: blender --background --python tools/synty_convert/convert.py -- <src_fbx_dir> <dst_asset_dir>
# src_fbx_dir  = path to the flat FBX folder in the Synty source pack
# dst_asset_dir = crates/client/assets  (GLBs land in synty/buildings/ and synty/nature/)

# ── Preset houses (10 unique designs for settlement variety) ─────────────────
